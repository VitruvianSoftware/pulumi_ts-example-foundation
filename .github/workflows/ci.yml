# Repository CI — validates the reference foundation codebase itself.
#
# This is NOT the deployment pipeline. The deployment pipeline templates
# (pulumi preview on PRs, pulumi up on merges) live in build/ and
# are copied into the operator's per-stage repositories during onboarding.
# See ONBOARDING.md for details.
#
# Templates:
#   build/pulumi-preview.yml  — runs pulumi preview on PRs
#   build/pulumi-up.yml       — runs pulumi up on merges


name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    name: "Build: ${{ matrix.stage }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stage:
          - 0-bootstrap
          - 1-org
          - 2-environments/envs/development
          - 2-environments/envs/nonproduction
          - 2-environments/envs/production
          - 3-networks-hub-and-spoke/envs/development
          - 3-networks-hub-and-spoke/envs/nonproduction
          - 3-networks-hub-and-spoke/envs/production
          - 3-networks-hub-and-spoke/envs/shared
          - 3-networks-svpc/envs/development
          - 3-networks-svpc/envs/nonproduction
          - 3-networks-svpc/envs/production
          - 3-networks-svpc/envs/shared
          - 4-projects/business_unit_1/development
          - 4-projects/business_unit_1/nonproduction
          - 4-projects/business_unit_1/production
          - 4-projects/business_unit_1/shared
          - 5-app-infra/business_unit_1/development
          - 5-app-infra/business_unit_1/nonproduction
          - 5-app-infra/business_unit_1/production
    steps:
      - name: Checkout foundation
        uses: actions/checkout@v4

      - name: Checkout library
        uses: actions/checkout@v4
        with:
          repository: VitruvianSoftware/pulumi-library
          path: ../pulumi-library

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Install root-level dependencies first so that the shared
      # modules/ directory can resolve @pulumi/pulumi, @pulumi/gcp, etc.
      # Stages reference ../modules/ via relative imports, and TypeScript
      # resolves module dependencies from the file's own directory tree.
      - name: Build library
        working-directory: ../pulumi-library/ts
        run: |
          npm install
          npm run build

      - name: Install root dependencies
        run: npm install

      - name: Install stage dependencies
        working-directory: ${{ matrix.stage }}
        run: npm install

      - name: TypeScript compile check
        working-directory: ${{ matrix.stage }}
        run: npx tsc --noEmit


  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout foundation
        uses: actions/checkout@v4

      - name: Checkout library
        uses: actions/checkout@v4
        with:
          repository: VitruvianSoftware/pulumi-library
          path: ../pulumi-library

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build library
        working-directory: ../pulumi-library/ts
        run: |
          npm install
          npm run build

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npx vitest run --passWithNoTests

  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install commitlint
        run: |
          npm install -D @commitlint/cli @commitlint/config-conventional
          echo "module.exports = { extends: ['@commitlint/config-conventional'], rules: {'subject-case': [0], 'header-max-length': [0]} };" > commitlint.config.js

      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: 'echo "$TITLE" | npx commitlint --verbose'
