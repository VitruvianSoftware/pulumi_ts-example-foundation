# Pulumi Up — runs on merge to environment branches.
#
# Copy this file to .github/workflows/ in your foundation repo.
# Authenticates via Workload Identity Federation (WIF) configured
# in the 0-bootstrap stage.
#
# Required GitHub Secrets:
#   WIF_PROVIDER_NAME    — projects/<number>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
#   SERVICE_ACCOUNT_EMAIL — the stage's service account (e.g. sa-pulumi-env@prj-b-cicd-xxxx.iam.gserviceaccount.com)
#   PULUMI_ACCESS_TOKEN   — Pulumi Cloud access token for state management

name: "pulumi-up"

on:
  push:
    branches:
      - "development"
      - "nonproduction"
      - "production"

jobs:
  deploy:
    name: "Deploy"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - uses: "actions/checkout@v4"

      - id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_NAME }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - uses: "actions/setup-node@v4"
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - uses: "pulumi/actions@v5"
        with:
          command: up
          stack-name: ${{ github.ref_name }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
